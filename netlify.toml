[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/contact"
  to = "/.netlify/functions/contact"
  status = 200

[[redirects]]
  from = "/api/subscribe"
  to = "/.netlify/functions/subscribe"
  status = 200

# Handle SPA routing with history API
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
